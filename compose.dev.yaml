# for local development ports are 3000 for frontend and 4000 for backend
services:
  backend:
    image: node:22-alpine
    container_name: lead-handler-backend
    ports:
      - '${LEAD_HANDLER_APP_PORT}:${LEAD_HANDLER_APP_PORT}'
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${LEAD_HANDLER_APP_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_POSTGRES=${DATABASE_URL_POSTGRES}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PASSWORD_ENCODED=${POSTGRES_PASSWORD_ENCODED}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - LEAD_HANDLER_APP_PORT=${LEAD_HANDLER_APP_PORT}
      - LEAD_HANDLER_FRONTEND_PORT=${LEAD_HANDLER_FRONTEND_PORT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SMSCLUB_API_KEY=${SMSCLUB_API_KEY}
      - ROBOTNIK_URL=${ROBOTNIK_URL}
      - ROBOTNIK_GEOIP_URL=${ROBOTNIK_GEOIP_URL}
      - ELNOPY_URL=${ELNOPY_URL}
      - ALTERCPA_URL=${ALTERCPA_URL}
      - ALTERCPA_GET_STATUSES_URL=${ALTERCPA_GET_STATUSES_URL}
      - HUSTLE_TEAM_ROBOTNIK_URL=${HUSTLE_TEAM_ROBOTNIK_URL}
      - VLASNYK_TOKEN=${VLASNYK_TOKEN}
      - LEGKOKBBB_TOKEN=${LEGKOKBBB_TOKEN}
      - TAIPAN_TOKEN=${TAIPAN_TOKEN}
      - ONION_TOKEN=${ONION_TOKEN}
      - LONDON_TOKEN=${LONDON_TOKEN}
      - POOL_TOKEN=${POOL_TOKEN}
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app # Mount the current directory to allow hot-reloading
      - /usr/src/app/node_modules # Prevent node_modules from being overwritten
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "npm i && npm run build && npm run prisma && npm run start:dev"
    networks:
      - lead-handler-network
      - shared-network

  frontend:
    image: node:22-alpine
    container_name: lead-handler-frontend
    ports:
      - '${LEAD_HANDLER_FRONTEND_PORT}:${LEAD_HANDLER_FRONTEND_PORT}'
    environment:
      - NEXT_PUBLIC_LOGS_URL=${NEXT_PUBLIC_LOGS_URL}
      - LEAD_HANDLER_FRONTEND_PORT=${LEAD_HANDLER_FRONTEND_PORT}
    working_dir: /usr/src/app
    volumes:
      - ./frontend:/usr/src/app # Mount the client directory
      - /usr/src/app/node_modules # Prevent node_modules from being overwritten
    depends_on:
      - backend
    restart: unless-stopped
    command: sh -c "npm install --include=dev &&
      npm run build &&
      npm run dev"
    networks:
      - lead-handler-network

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_ENCODED}
      POSTGRES_DB: lead_handler
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d lead_handler']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lead-handler-network

volumes:
  postgres_data:

networks:
  lead-handler-network:
    name: lead-handler-network
    driver: bridge
  shared-network:
    name: shared-network
    external: true
